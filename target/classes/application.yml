server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: ai-reader-backend
  
  # 主配置
  main:
    allow-bean-definition-overriding: true
  
  # 禁用Spring Boot的Neo4j自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration
  
  # 数据源配置 (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/ai_reader_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ZZQ123456zzq
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
  
  # JPA配置
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # MongoDB配置
  data:
    mongodb:
      uri: mongodb://localhost:27017/ai_reader
    
    # Neo4j配置 - 适配Spring Boot 3.x
    neo4j:
      # 连接URI
      uri: bolt://localhost:7687
      # 认证信息
      authentication:
        username: neo4j
        password: ZZQ123456zzq
      # 连接池设置
      pool:
        max-connection-lifetime: 1h
        max-connection-pool-size: 50
  
  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 5000
          max-attempts: 3
          multiplier: 2
          max-interval: 30000
    template:
      exchange: rss.exchange  # 取消注释，启用默认交换机配置
      routing-key:
        article-processing: article.analysis
        rss-fetch: rss.fetch
        knowledge-graph: knowledge.graph.update
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
      
  # Spring AI OpenAI 配置
  ai:
    openai:
      api-key: YOUR_OPENAI_API_KEY_HERE  # !!! 请替换为你的OpenAI API Key !!!
      base-url: https://api.openai.com
      model: gpt-3.5-turbo # 或者你偏好的其他模型，如 gpt-4
      temperature: 0.7
      top-p: 1.0
      max-tokens: 2000

# JWT配置
jwt:
  secret: 84c7ec5d1c43cdd16d9659b42c1cd91f7ba5b2d12c7e49fda90bda9e0e97cfa9
  access-token-expiration: 3600000  # 1小时
  refresh-token-expiration: 604800000  # 7天

# 自定义RSS配置
rss:
  fetch:
    cron: 0 0 */6 * * *  # 每6小时抓取一次RSS源
    timeout: 30000  # 请求超时时间（毫秒）

# AI服务配置（示例，具体根据实际的AI服务进行配置）
#ai:
#  service:
#    url: http://localhost:9000/api
#    apiKey: your-api-key-here
#    timeout: 60000  # 请求超时时间（毫秒）

# 日志配置
logging:
  level:
    root: INFO
    com.aireader.backend: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.aireader.backend.controller

# Actuator端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized 